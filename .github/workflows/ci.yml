name: CI

on:
  push:
  pull_request:
    branches:
      - main
  schedule:
    - cron: "23 1 * * 0"
  workflow_dispatch:

jobs:
  linting:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up uv with Python 3.12
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.8.22"
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run Ruff
        run: uv run tox -e lint -- --output-format github

  testing:
    needs: linting
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.10"
            tox-env: py310
          - os: ubuntu-latest
            python-version: "3.11"
            tox-env: py311
          - os: ubuntu-latest
            python-version: "3.12"
            tox-env: py312
          - os: ubuntu-latest
            python-version: "3.13"
            tox-env: py313

    steps:
      - uses: actions/checkout@v4

      - name: Set up uv with Python ${{ matrix.python-version }}
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.8.22"
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run tests
        run: uv run tox -e ${{ matrix.tox-env }}

  finalise:
    runs-on: ubuntu-latest
    needs: [linting, testing]

    steps:
      - name: Finalise
        run: echo "All done"
